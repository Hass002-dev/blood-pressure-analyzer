<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Final Exam: Box, Flex & Grid</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }
    h2 { color: gold; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 50px; }
    .exam-container { background-color: #222; padding: 20px; border: 2px dashed #555; }

    /* =========================================
       LEVEL 1: EASY (The Box Model)
       ========================================= */
    .level-1-box {
      background-color: #E72F24;
      width: 200px;
      text-align: center;
      border: 5px solid white;

      /* TASK 1: Add a 5px solid white border */
      /* YOUR CODE: */
      
      /* TASK 2: Add 30 pixels of padding on all sides to make it thick */
      /* YOUR CODE: */
      padding: 30px;
      margin: 20px auto;
      /* TASK 3: Push it exactly into the center of the screen using the 2-number margin shortcut (give it 20px on the top/bottom) */
      /* YOUR CODE: */
      
    }

    /* =========================================
       LEVEL 2: MEDIUM (Flexbox Alignment)
       ========================================= */
    .level-2-nav {
      background-color: #004592;
      height: 80px;
      padding: 0 20px;
      
      /* TASK 1: Turn on the Flexbox engine */
      /* YOUR CODE: */
      display: flex;
      /* TASK 2: Push the "Logo" to the far left, and "Menu" to the far right */
      /* YOUR CODE: */
      flex-direction: row;
      justify-content: space-between;
      /* TASK 3: Vertically center the text so it doesn't stick to the top of the blue box */
      align-items:center;
      /* YOUR CODE: */
      
    }
    .nav-item { font-weight: bold; font-size: 1.5rem; background: #222; padding: 10px; }

    /* =========================================
       LEVEL 3: HARD (The Smart Grid)
       ========================================= */
    .level-3-grid {
      background-color: #444;
      padding: 20px;
      
      /* TASK 1: Turn on the Grid engine */
      /* YOUR CODE: */
      display: grid;
      /* TASK 2: Use the 'Smart Grid' code to automatically fit as many 250px columns as possible, stretching to 1fr */
      /* YOUR CODE: */
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    
      gap: 20px;
      /* TASK 3: Add a 20px gap between all the boxes */
      /* YOUR CODE: */
      margin: 20px auto;
    }
    .grid-card { background-color: mediumseagreen; padding: 30px; font-size: 1.5rem; text-align: center; font-weight: bold;}
    
    /* TASK 4: Make "Card 1" act as a Header that stretches across exactly 3 columns */
    .card-1 {
      /* YOUR CODE: */
      grid-column: span 3;
    }

    /* =========================================
       LEVEL 4: PRO (The Grid Line Sniper)
       ========================================= */
    .level-4-grid {
      background-color: #333;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr; /* 4 Equal Columns */
      grid-template-rows: 100px 100px 100px 100px; /* 4 Equal Rows */
      gap: 10px;
      padding: 20px;
    }
    
    .pro-box {
      background-color: darkorchid;
      font-size: 1.5rem;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      
      /* TASK 1: Use `grid-area` to snipe this box right into the middle!
                 It needs to sit EXACTLY in Row 2 and Row 3, AND Column 2 and Column 3.
                 (Remember to count the invisible lines, not the boxes!) */
                 
      /* YOUR CODE: */
      grid-area: 2/2/4/4 ;
    }

  </style>
</head>
<body>

  <h1>Final Exam: Layout Mastery</h1>

  <h2>Level 1: The Box Model</h2>
  <div class="exam-container">
    <div class="level-1-box">Fix my Padding, Border, and Margin!</div>
  </div>

  <h2>Level 2: Flexbox</h2>
  <div class="exam-container">
    <div class="level-2-nav">
      <div class="nav-item">LOGO</div>
      <div class="nav-item">MENU</div>
    </div>
  </div>

  <h2>Level 3: The Smart Grid</h2>
  <div class="exam-container">
    <div class="level-3-grid">
      <div class="grid-card card-1">Card 1 (Make me span 3!)</div>
      <div class="grid-card">Card 2</div>
      <div class="grid-card">Card 3</div>
      <div class="grid-card">Card 4</div>
      <div class="grid-card">Card 5</div>
      <div class="grid-card">Card 6</div>
    </div>
  </div>

  <h2>Level 4: The Grid Line Sniper</h2>
  <div class="exam-container">
    <div class="level-4-grid">
      <div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div>
      <div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div>
      <div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div>
      <div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div><div style="border: 1px solid #555;"></div>
      
      <div class="pro-box">Trap me in the exact middle!</div>
    </div>
  </div>

</body>
</html>
