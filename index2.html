<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive Site</title>
    
    <!-- ========================================== -->
    <!-- THE WARDROBE / STICKER BOOK (CSS)          -->
    <!-- ========================================== -->
    <style>
        /* Base Structure Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            transition: background-color 0.4s, color 0.4s; /* Makes color changes smooth */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            margin-top: 50px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: white;
            transition: 0.2s;
        }

        #announcement-banner {
            background-color: #ffeaa7;
            width: 100%;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #fdcb6e;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        /* ------------------------------------------ */
        /* THE STICKERS (Classes JS will add/remove)  */
        /* ------------------------------------------ */
        
        /* Sticker 1: Dark Mode */
        .dark-theme {
            background-color: #2d3436;
            color: #dfe6e9;
        }

        /* Sticker 2: Hidden */
        .hidden {
            display: none !important;
        }

        /* Sticker 3: Liked */
        .liked {
            background-color: #ff7675;
            color: white;
            border-color: #d63031;
        }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- THE STRUCTURE (HTML)                       -->
    <!-- ========================================== -->

    <!-- The Banner -->
    <div id="announcement-banner">
        <span>🎉 Welcome to the DOM Playground!</span>
        <button id="close-banner-btn">Close X</button>
    </div>

    <!-- The Main Content -->
    <div class="container">
        <h1>Hello, DOM Master!</h1>
        <p>Try clicking the buttons below to trigger the JavaScript.</p>
        
        <button id="dark-mode-btn">🌙 Toggle Dark Mode</button>
        <button id="like-btn">🤍 Like</button>
    </div>

    <!-- ========================================== -->
    <!-- THE WAREHOUSE MANAGER (JavaScript)         -->
    <!-- ========================================== -->
    <script>
        // FEATURE 1: DARK MODE
        // 1. Hire the detectives to find the button and the body
        var darkBtn = document.querySelector("#dark-mode-btn");
        var pageBody = document.querySelector("body");

        // 2. Attach the Ear to the button. Wait for a "click".
        darkBtn.addEventListener("click", function() {
            // 3. When clicked, toggle the "dark-theme" sticker on the body!
            pageBody.classList.toggle("dark-theme");
        });


        // FEATURE 2: CLOSE THE BANNER
        // 1. Hire detectives to find the close button and the banner itself
        var closeBtn = document.querySelector("#close-banner-btn");
        var banner = document.querySelector("#announcement-banner");

        // 2. Attach the Ear to the close button
        closeBtn.addEventListener("click", function() {
            // 3. When clicked, slap the "hidden" sticker onto the banner
            banner.classList.add("hidden");
        });


        // FEATURE 3: THE LIKE BUTTON
        // 1. Hire the detective
        var likeBtn = document.querySelector("#like-btn");

        // 2. Attach the Ear
        likeBtn.addEventListener("click", function() {
            // 3. Toggle the "liked" sticker
            likeBtn.classList.toggle("liked");
            
            // 4. Bonus: Change the text depending on if the sticker is there!
            // .contains() asks the detective: "Is the sticker currently on?"
            if (likeBtn.classList.contains("liked")) {
                likeBtn.innerHTML = "❤️ Liked!";
            } else {
                likeBtn.innerHTML = "🤍 Like";
            }
        });

    </script>
</body>
</html>
