<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Dicee</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Indie+Flower|Lobster" rel="stylesheet">

    <!-- The CSS (Your styles.css) -->
    <style>
      .container {
        width: 70%;
        margin: auto;
        text-align: center;
      }
      .dice {
        text-align: center;
        display: inline-block;
      }
      body {
        background-color: #393E46;
      }
      h1 {
        margin: 30px;
        font-family: 'Lobster', cursive;
        text-shadow: 5px 0 #232931;
        font-size: 8rem;
        color: #4ECCA3;
      }
      p {
        font-size: 2rem;
        color: #4ECCA3;
        font-family: 'Indie Flower', cursive;
      }
      img {
        width: 80%;
      }
      footer {
        margin-top: 5%;
        color: #EEEEEE;
        text-align: center;
        font-family: 'Indie Flower', cursive;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Refresh Me</h1>

      <div class="dice">
        <p>Player 1</p>
        <!-- Back to the local placeholder image -->
        <img class="img1" src="../Skeleton Project/Dicee Challenge - Completed/images/dice6.png">
      </div>

      <div class="dice">
        <p>Player 2</p>
        <!-- Back to the local placeholder image -->
        <img class="img2" src="../Skeleton Project/Dicee Challenge - Completed/images/dice6.png">
      </div>
    </div>

    <!-- ==================================================== -->
    <!-- YOUR PERFECT JAVASCRIPT                              -->
    <!-- ==================================================== -->
    <script>
        // --- PHASE 1: PLAYER 1 ---
        var player1Roll = Math.floor(Math.random() * 6) + 1;
        
        // Using your local 'images/' folder path
        var player1ImageSource = "images/dice" + player1Roll + ".png";
        
        var image1 = document.querySelectorAll("img")[0];
        image1.setAttribute("src", player1ImageSource);
        

        // --- PHASE 2: PLAYER 2 ---
        var player2Roll = Math.floor(Math.random() * 6) + 1;
        
        // Using your local 'images/' folder path
        var player2ImageSource = "images/dice" + player2Roll + ".png";
        
        var image2 = document.querySelectorAll("img")[1];
        image2.setAttribute("src", player2ImageSource);
        

        // --- PHASE 3: THE WINNER ANNOUNCEMENT ---
        if (player1Roll > player2Roll) {
          document.querySelector("h1").innerHTML = "🚩 Player 1 wins!";
        }
        else if (player2Roll > player1Roll) {
          document.querySelector("h1").innerHTML = "Player 2 wins! 🚩";
        }
        else {
          document.querySelector("h1").innerHTML = "Draw!!!";
        }
    </script>

    <footer>
      www 🎲 App Brewery 🎲 com
    </footer>
  </body>
</html>
